<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptionsGenie - Options Trading Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #667eea;
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        
        .input-section {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            align-items: center;
        }
        
        input[type="text"] {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            width: 250px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 12px 30px;
            font-size: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #c33;
            margin-bottom: 20px;
            display: none;
        }
        
        .stock-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: none;
        }
        
        .stock-info h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .stock-price {
            font-size: 2em;
            color: #667eea;
            font-weight: bold;
        }
        
        .strategies-section {
            display: none;
        }
        
        .strategies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .strategy-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .strategy-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .strategy-name {
            color: #667eea;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .strategy-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .strategy-details {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            font-weight: 600;
            color: #555;
        }
        
        .detail-value {
            color: #333;
        }
        
        .profit {
            color: #22c55e;
        }
        
        .loss {
            color: #ef4444;
        }
        
        .chart-container {
            width: 100%;
            height: 300px;
            margin-top: 15px;
        }
        
        .options-table-section {
            margin-top: 40px;
            display: none;
        }
        
        .options-table-section h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        thead {
            background: #667eea;
            color: white;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
        }
        
        th {
            font-weight: 600;
        }
        
        tbody tr:nth-child(even) {
            background: #f8f9fa;
        }
        
        tbody tr:hover {
            background: #e9ecef;
        }
        
        .call-row {
            border-left: 3px solid #22c55e;
        }
        
        .put-row {
            border-left: 3px solid #ef4444;
        }
        
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab.active {
            border-bottom: 3px solid #667eea;
            color: #667eea;
            font-weight: 600;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔮 OptionsGenie</h1>
            <p class="subtitle">Analyze Options Strategies & Maximize Your Trading Potential</p>
        </header>
        
        <div class="input-section">
            <input type="text" id="tickerInput" placeholder="Enter Stock Ticker (e.g., AAPL)" />
            <button id="analyzeBtn" onclick="analyzeOptions()">Analyze Options</button>
        </div>
        
        <div class="error" id="errorMessage"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching options data and analyzing strategies...</p>
        </div>
        
        <div class="stock-info" id="stockInfo">
            <h2 id="stockTicker"></h2>
            <div class="stock-price" id="stockPrice"></div>
        </div>
        
        <div class="strategies-section" id="strategiesSection">
            <h2>Recommended Options Strategies</h2>
            <div class="strategies-grid" id="strategiesGrid"></div>
        </div>
        
        <div class="options-table-section" id="optionsTableSection">
            <h2>Available Options Contracts</h2>
            <div class="tab-container">
                <button class="tab active" onclick="showTab('all', event)">All Options</button>
                <button class="tab" onclick="showTab('calls', event)">Calls Only</button>
                <button class="tab" onclick="showTab('puts', event)">Puts Only</button>
            </div>
            <div class="table-container">
                <table id="optionsTable">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Expiration</th>
                            <th>Days to Expiry</th>
                            <th>Strike</th>
                            <th>Last Price</th>
                            <th>Bid</th>
                            <th>Ask</th>
                            <th>Volume</th>
                            <th>Open Interest</th>
                            <th>Implied Vol</th>
                        </tr>
                    </thead>
                    <tbody id="optionsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        let currentFilter = 'all';
        let optionsData = [];
        
        // Enable Enter key to trigger analysis
        document.getElementById('tickerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeOptions();
            }
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showTab(filter, event) {
            currentFilter = filter;
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderOptionsTable(optionsData, filter);
        }
        
        async function analyzeOptions() {
            const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
            
            if (!ticker) {
                showError('Please enter a stock ticker symbol');
                return;
            }
            
            // Hide previous results
            document.getElementById('stockInfo').style.display = 'none';
            document.getElementById('strategiesSection').style.display = 'none';
            document.getElementById('optionsTableSection').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('analyzeBtn').disabled = true;
            
            try {
                const response = await fetch(`/api/options/${ticker}`);
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to fetch options data');
                }
                
                // Store options data
                optionsData = data.options;
                
                // Display stock info
                document.getElementById('stockTicker').textContent = data.ticker;
                document.getElementById('stockPrice').textContent = `$${data.currentPrice.toFixed(2)}`;
                document.getElementById('stockInfo').style.display = 'block';
                
                // Display strategies
                renderStrategies(data.strategies, data.currentPrice);
                document.getElementById('strategiesSection').style.display = 'block';
                
                // Display options table
                renderOptionsTable(data.options, 'all');
                document.getElementById('optionsTableSection').style.display = 'block';
                
            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('analyzeBtn').disabled = false;
            }
        }
        
        function renderStrategies(strategies, currentPrice) {
            const grid = document.getElementById('strategiesGrid');
            grid.innerHTML = '';
            
            strategies.forEach((strategy, index) => {
                const card = document.createElement('div');
                card.className = 'strategy-card';
                
                const maxProfitStr = typeof strategy.maxProfit === 'number' 
                    ? `$${strategy.maxProfit.toFixed(2)}` 
                    : strategy.maxProfit;
                const maxLossStr = typeof strategy.maxLoss === 'number' 
                    ? `$${strategy.maxLoss.toFixed(2)}` 
                    : strategy.maxLoss;
                
                card.innerHTML = `
                    <div class="strategy-name">${strategy.name}</div>
                    <div class="strategy-description">${strategy.description}</div>
                    <div class="strategy-details">
                        <div class="detail-row">
                            <span class="detail-label">Expiration:</span>
                            <span class="detail-value">${strategy.expiration}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Net Premium:</span>
                            <span class="detail-value">$${strategy.premium.toFixed(2)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Initial Cost:</span>
                            <span class="detail-value">$${strategy.cost.toFixed(2)}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Max Profit:</span>
                            <span class="detail-value profit">${maxProfitStr}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Max Loss:</span>
                            <span class="detail-value loss">${maxLossStr}</span>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="chart${index}"></canvas>
                    </div>
                `;
                
                grid.appendChild(card);
                
                // Create chart if Chart.js is available
                setTimeout(() => {
                    if (typeof Chart !== 'undefined') {
                        const ctx = document.getElementById(`chart${index}`);
                        new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: strategy.prices.map(p => `$${p.toFixed(0)}`),
                            datasets: [{
                                label: 'Profit/Loss',
                                data: strategy.payoffs,
                                borderColor: '#667eea',
                                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                                borderWidth: 2,
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: false
                                },
                                title: {
                                    display: true,
                                    text: 'Payoff Diagram'
                                }
                            },
                            scales: {
                                x: {
                                    title: {
                                        display: true,
                                        text: 'Stock Price at Expiration'
                                    },
                                    ticks: {
                                        maxTicksLimit: 8
                                    }
                                },
                                y: {
                                    title: {
                                        display: true,
                                        text: 'Profit/Loss ($)'
                                    },
                                    grid: {
                                        color: function(context) {
                                            if (context.tick.value === 0) {
                                                return '#333';
                                            }
                                            return '#e0e0e0';
                                        },
                                        lineWidth: function(context) {
                                            if (context.tick.value === 0) {
                                                return 2;
                                            }
                                            return 1;
                                        }
                                    }
                                }
                            }
                        }
                    });
                    } else {
                        // If Chart.js is not available, show a message
                        const ctx = document.getElementById(`chart${index}`);
                        ctx.parentElement.innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">Chart visualization unavailable. Install Chart.js or check network connection.</p>';
                    }
                }, 100);
            });
        }
        
        function renderOptionsTable(options, filter) {
            const tbody = document.getElementById('optionsTableBody');
            tbody.innerHTML = '';
            
            let filteredOptions = options;
            if (filter === 'calls') {
                filteredOptions = options.filter(opt => opt.type === 'call');
            } else if (filter === 'puts') {
                filteredOptions = options.filter(opt => opt.type === 'put');
            }
            
            // Sort by expiration and strike
            filteredOptions.sort((a, b) => {
                if (a.expiration !== b.expiration) {
                    return a.expiration.localeCompare(b.expiration);
                }
                return a.strike - b.strike;
            });
            
            filteredOptions.forEach(option => {
                const row = document.createElement('tr');
                row.className = option.type === 'call' ? 'call-row' : 'put-row';
                
                row.innerHTML = `
                    <td><strong>${option.type.toUpperCase()}</strong></td>
                    <td>${option.expiration}</td>
                    <td>${option.daysToExpiry}</td>
                    <td>$${option.strike.toFixed(2)}</td>
                    <td>$${option.lastPrice.toFixed(2)}</td>
                    <td>$${option.bid.toFixed(2)}</td>
                    <td>$${option.ask.toFixed(2)}</td>
                    <td>${option.volume || 0}</td>
                    <td>${option.openInterest || 0}</td>
                    <td>${(option.impliedVolatility * 100).toFixed(1)}%</td>
                `;
                
                tbody.appendChild(row);
            });
        }
    </script>
</body>
</html>
